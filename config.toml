[paths]
target_directories = ["/mnt/media"]     # One or more directories to overmount (existing SMB/NFS mounts Plex reads from)
cache_directory = "/mnt/ssd-cache"      # SSD cache storage (NOT the FUSE mount) — each target gets a subdirectory here
instance_name = "plex-movies"           # Unique name for this instance — used for DB filename and process lock (alphanumeric, hyphens, underscores)

[preset]
name = "plex-episode-prediction"         # Preset to use: "plex-episode-prediction" or "prefetch"

# ---------------------------------------------------------------------------
# [prefetch] — only used when preset.name = "prefetch"
# ---------------------------------------------------------------------------
[prefetch]
mode = "cache-hit-only"                  # "cache-hit-only" — cache only the accessed file (default, safest)
                                         # "cache-neighbors" — cache all sibling files in the same directory
                                         # "cache-parent-recursively" — recursively cache parent directory up to max_depth levels
max_depth = 3                            # Max recursion depth for cache-parent-recursively (default 3)
process_allowlist = []                   # Process binary names (and their children) allowed to trigger caching
                                         # If non-empty, ONLY these processes can trigger caching; all others are silently ignored
                                         # Empty list (default) disables the allowlist — falls through to process_blocklist
process_blocklist = []                   # Process binary names (and their children) that must never trigger caching
file_whitelist = []                      # Regex patterns matched against filename — only matching files are cached
                                         # Empty list = allow all files (when blacklist is also empty)
file_blacklist = []                      # Regex patterns matched against filename — matching files are never cached
                                         # Blacklist is checked before whitelist; blacklist wins if both match
                                         # All patterns must be valid regex or the daemon refuses to start

[plex]
lookahead = 4                            # Episodes to cache ahead of the current one
mode = "miss-only"                       # "miss-only" | "rolling-buffer" (keep next N always loaded)
process_allowlist = []                   # Process binary names (and their children) allowed to trigger prediction
                                         # If non-empty, ONLY these processes can trigger prediction; all others are silently ignored
                                         # Empty list (default) disables the allowlist — falls through to process_blocklist
process_blocklist = ["Plex Media Scanner", "Plex EAE Service", "Plex Media Fingerprinter"]
                                         # Process binary names (and their children) never allowed to trigger prediction:
                                         # "Plex Media Scanner" — visual analysis / thumbnail generation, never streams to users
                                         # "Plex EAE Service" — audio fingerprinting for intro/credit detection
                                         # "Plex Media Fingerprinter" — separate audio fingerprinting binary
                                         # "Plex Transcoder" — NOT blocked: needed for transcoded playback

[eviction]
max_size_gb = 200.0                      # Total cache budget across ALL backing mounts combined
expiry_hours = 72                        # Delete cached files not accessed within this window
min_free_space_gb = 10.0                 # Stop caching if SSD free space drops below this
poll_interval_secs = 300                 # How often the maintenance task runs (seconds). Drives eviction
                                         # sweeps and on-maintenance invalidation. Set 0 to disable.
# strategy = "lru"                       # Eviction strategy — only "lru" supported (reserved for future use)

# ---------------------------------------------------------------------------
# [invalidation] — cache consistency against backing file mutations
# ---------------------------------------------------------------------------
[invalidation]
# Check cached files against their backing counterparts on every FUSE open()
# cache hit. Adds one backing stat() per hit — cheap locally, noticeable on
# remote backings (SMB/NFS). Detects staleness in real time.
check_on_hit = false

# Check cached files against their backing counterparts during the periodic
# maintenance sweep (see eviction.poll_interval_secs). Catches files that
# were rewritten on the backing but haven't been accessed since. Bounded
# detection latency of one poll interval. Default on — the sweep runs off the
# hot path, so the correctness benefit is free for most users.
check_on_maintenance = true

[cache]
# max_size_gb, expiry_hours, min_free_space_gb have moved to [eviction] above.
# They still work here for backward compatibility but will log a deprecation warning.
passthrough_mode = false                 # If true, bypass cache entirely (debug/test mode)
max_cache_pull_per_mount_gb = 0.0        # Per-mount lookahead prediction budget (0 = unlimited)
deferred_ttl_minutes = 1440             # Discard saved deferred events older than this on startup (default 24h)
min_access_secs = 2                      # Minimum seconds a file must stay open before prediction triggers. Filters transient Plex scanner/transcoder probes that open files briefly without streaming. Set to 0 only for tests or debugging.
min_file_size_mb = 0                     # Skip files below this size in MB — filters metadata/subtitle noise (0 = no floor)
max_concurrent_copies = 1               # Max parallel backing→cache copies. 1 = serial (default, safest).
                                         # Bump to 2–8 on fast SSDs with a slow backing mount (SMB/NFS)
                                         # to saturate read bandwidth during multi-episode prefills.

[schedule]
cache_window_start = "08:00"             # Allowed caching window start (HH:MM, 24h)
cache_window_end = "02:00"               # Allowed caching window end (wraps past midnight)

[logging]
log_directory = "/var/log/fscache"       # Directory for rolling daily log files
console_level = "info"                   # Log level for terminal output (error/warn/info/debug/trace)
file_level = "debug"                     # Log level for log files (captures full detail)
repeat_log_window_secs = 300             # Suppress repeated access logs for the same file within this window (0 = disabled)
